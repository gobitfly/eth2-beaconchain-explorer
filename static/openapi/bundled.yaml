                        items:
                          $ref: '#/components/schemas/types.ApiValidatorIncomeHistoryResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/validator/{indexOrPubkey}/performance:
    get:
      tags:
        - Rewards
      summary: Get validator consensus layer rewards
      description: Retrieve validator consensus layer rewards by index or pubkey (up to 100).
      parameters:
        - name: indexOrPubkey
          in: path
          description: Up to 100 validator indicesOrPubkeys, comma separated
          required: true
          style: simple
          explode: false
          schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/types.ApiResponse'
                  - properties:
                      data:
                        items:
                          $ref: '#/components/schemas/types.ApiValidatorPerformanceResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/validator/{indexOrPubkey}/proposals:
    get:
      tags:
        - Validators
      summary: Get validator proposals
      description: Get all proposed blocks during the last 100 epochs for up to 100 validators. Optionally set the epoch query parameter to look back further.
      parameters:
        - name: indexOrPubkey
          in: path
          description: Up to 100 validator indicesOrPubkeys, comma separated
          required: true
          style: simple
          explode: false
          schema: {}
        - name: epoch
          in: query
          description: Page the result by epoch
          required: false
          style: form
          explode: true
          schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/types.ApiResponse'
                  - properties:
                      data:
                        items:
                          $ref: '#/components/schemas/types.ApiValidatorProposalsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/validator/{indexOrPubkey}/withdrawals:
    get:
      tags:
        - Validators
      summary: Get validator withdrawal history
      description: Retrieve validator withdrawal history by index or pubkey (up to 100).
      parameters:
        - name: indexOrPubkey
          in: path
          description: Up to 100 validator indicesOrPubkeys, comma separated
          required: true
          style: simple
          explode: false
          schema: {}
        - name: epoch
          in: query
          description: 'the start epoch for the withdrawal history (default: latest epoch)'
          required: false
          style: form
          explode: true
          schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/types.ApiResponse'
                  - properties:
                      data:
                        items:
                          $ref: '#/components/schemas/types.ApiValidatorWithdrawalResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/validators/proposalLuck:
    get:
      tags:
        - Validators
      summary: Get validator proposal luck
      description: Returns the proposal luck of a validator or a list of validators
      parameters:
        - name: validators
          in: query
          description: Provide a comma separated list of validator indices or pubkeys
          required: true
          style: form
          explode: true
          schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/types.ApiResponse'
                  - properties:
                      data:
                        items:
                          $ref: '#/components/schemas/types.ApiProposalLuckResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/validators/queue:
    get:
      tags:
        - Validators
      summary: Get validator queue
      description: Returns the current number of validators entering and exiting the beacon chain
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/types.ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/types.ApiValidatorQueueResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
components:
