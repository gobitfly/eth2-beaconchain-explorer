      name: apikey
      description: 'Authorization header with value: Bearer <token>'
  schemas:
    types.ApiErrorResponse:
      properties:
        status:
          type: string
          example: 'ERROR: <Message>'
        data:
          type: string
          nullable: true
          default: null
    types.ApiResponse:
      properties:
        status:
          type: string
          enum:
            - OK
        data: {}
    types.EnsDomainResponse:
      type: object
