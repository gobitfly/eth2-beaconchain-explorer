openapi: 3.0.4
info:
  title: beaconcha.in API Documentation
  description: |-
    ## Introduction
    **Advanced and reliable API for accessing comprehensive Ethereum blockchain data.**

    - **Free Usage Policy:** The API is free to use under a fair use policy, with rate limits of 10 requests per minute per IP.
    - **Caching:** All responses are cached for 1 minute.
    - **Higher Usage Plans:** For higher usage plans, visit: [https://beaconcha.in/pricing](https://beaconcha.in/pricing). An API key is required to use these plans.

    ### API Key Usage
    API keys can be obtained at [/user/settings](https://beaconcha.in/user/settings) and must be included in requests either as a query string parameter or in the request header.

    #### Example: Query String Parameter
    ```bash
    curl https://beaconcha.in/api/v1/slot/1?apikey=<your_key>
    ```

    #### Example: Request Header
    ```bash
    curl -H 'apikey: <your_key>' https://beaconcha.in/api/v1/slot/1
    ```
  contact: {}
  version: '1.1'
servers:
  - url: https://beaconcha.in
    description: Ethereum mainnet
  - url: https://hoodi.beaconcha.in
    description: Hoodi Ethereum testnet
security:
  - ApiKeyAuthQuery: []
  - ApiKeyAuthHeader: []
tags:
  - name: Epoch
    description: Data related to consensus layer epochs
  - name: Slots
    description: Data related to consensus layer slots
  - name: Validators
    description: Data related to consensus layer validators
  - name: Rewards
    description: Data related to validator rewards
  - name: Sync Committees
    description: Data related to sync committees
  - name: Rocketpool
    description: Data related to the rocketpool protocol
  - name: ETH.Store®
    description: Data related to the ETH.Store® metric
  - name: Validator deposits
    description: Data related to execution layer validator deposits
  - name: Blocks
    description: Data related to execution layer blocks
  - name: Gas
    description: Data related to gas prices
  - name: Address
    description: Data related to ethereum addresses
  - name: Network
    description: Network data
  - name: Misc
  - name: User
paths:
  /api/healthz:
    get:
      tags:
        - Misc
      summary: Get explorer Health
      description: |-
        Provides the health status of all modules of the explorer. This endpoint is useful for monitoring the availability and functionality of the explorer's components.
        - **Modules Monitored:** Includes monitoring of services such as `monitoring_app`, `monitoring_el_data`, `monitoring_services`, `monitoring_cl_data`, `monitoring_api`, `monitoring_redis`.
        - **Response Details:** Returns the status of each module. If all modules are operational, the response will indicate success. Otherwise, it will return an error with details about the failing modules.
      responses:
        '200':
          description: |-
            All modules are healthy. Response format:
            ```
            module monitoring_el_data: OK
            module monitoring_cl_data: OK
            module monitoring_redis: OK
            module monitoring_api: OK
            module monitoring_services: OK
            module monitoring_app: OK
            ```
          content:
            text/plain:
              example: |-
                module monitoring_el_data: OK
                module monitoring_cl_data: OK
                module monitoring_redis: OK
                module monitoring_api: OK
                module monitoring_services: OK
                module monitoring_app: OK
        '500':
          description: |-
            Some modules are unhealthy. Response format:
            ```
            module monitoring_el_data: ERROR
            module monitoring_cl_data: OK
            module monitoring_redis: ERROR
            module monitoring_api: OK
            module monitoring_services: OK
            module monitoring_app: ERROR
            ```
          content:
            text/plain:
              example: |-
                module monitoring_el_data: ERROR
                module monitoring_cl_data: OK
                module monitoring_redis: ERROR
                module monitoring_api: OK
                module monitoring_services: OK
                module monitoring_app: ERROR
  /api/healthz-loadbalancer:
    get:
      tags:
        - Misc
      summary: Get explorer Availability
      description: Health endpoint to monitor the operational status of the explorer (used for load balancer health checks)
      responses:
        '200':
          description: |-
            Explorer is healthy. Response format:
            ```
            OK. Last epoch is from 1m ago
            ```
          content:
            text/plain:
              example: OK. Last epoch is from 1m ago
        '500':
          description: |-
            Explorer is unhealthy. Response format:
            ```
            Internal server error: could not retrieve latest epoch from the db
            ```
          content:
            text/plain:
              example: 'Internal server error: could not retrieve latest epoch from the db'
  /api/v1/chart/{chart}:
    get:
      tags:
        - Misc
      summary: Get chart
      description: Returns charts from the page https://beaconcha.in/charts as PNG
      parameters:
        - name: chart
          in: path
          description: Chart Names
          required: true
          style: simple
          explode: false
          schema:
            type: string
            enum:
              - blocks
              - validators
              - staked_ether
              - average_balance
              - network_liveness
              - participation_rate
              - stake_effectiveness
              - balance_distribution
              - effective_balance_distribution
              - performance_distribution_365d
              - deposits
              - withdrawals
              - graffiti_wordcloud
              - pools_distribution
              - historic_pool_performance
              - avg_gas_used_chart_data
              - execution_burned_fees
              - block_gas_used
              - block_count_chart_data
              - block_time_avg_chart_data
              - avg_gas_limit_chart_data
              - avg_block_util_chart_data
              - tx_count_chart_data
            example: validators
      responses:
        '200':
          description: Chart PNG image generated successfully
          content:
            image/png:
              schema:
                type: string
                format: binary
                description: PNG image file containing the requested chart
        '400':
          description: Bad Request - Invalid chart name or no data available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
              examples:
                invalid_chart:
                  summary: Invalid chart name
                  value:
                    status: 'ERROR: invalid chart name'
                    data: null
                no_data:
                  summary: No data available
                  value:
                    status: 'ERROR: no data available for the requested chart'
                    data: null
  /api/v1/client/metrics:
    post:
      tags:
        - User
      summary: Submit client stats
      description: Used in consensus layer clients to submit stats to your beaconcha.in account. This data can be accessed by the app or the user stats api call.
      parameters:
        - name: apikey
          in: query
          description: User API key, can be found on https://beaconcha.in/user/settings
          required: true
          style: form
          explode: true
          schema: {}
        - name: machine
          in: query
          description: Name your device if you have multiple devices you want to monitor
          required: false
          style: form
          explode: true
          schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/ens/lookup/{domain}:
    get:
      tags:
        - ENS
      summary: Resolve an ens name or address
      description: Get the address for an ens name and vice versa. Returns and object with the ens name and address - if found.
      parameters:
        - name: domain
          in: path
          description: domain can either be an ens name or an Etherum address
          required: true
          style: simple
          explode: false
          schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/types.ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/types.EnsDomainResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/epoch/{epoch}:
    get:
      tags:
        - Epochs
      summary: Get epoch
      description: Returns information for a specified epoch by the epoch number or an epoch tag (can be latest or finalized)
      parameters:
        - name: epoch
          in: path
          description: Epoch number, the string latest or the string finalized
          required: true
          style: simple
          explode: false
          schema: {}
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/types.ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/types.APIEpochResponse'
        '400':
          description: Failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/epoch/{epoch}/slots:
    get:
      tags:
        - Epochs
      summary: Get epoch slots
      description: Returns all slots for a specified epoch
      parameters:
        - name: epoch
          in: path
          description: Epoch number, the string latest or string finalized
          required: true
          style: simple
          explode: false
          schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/types.ApiResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/types.APISlotResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/eth1deposit/{txhash}:
    get:
      tags:
        - Validator deposits
      summary: Get deposits by tx
      description: Returns all deposits for a specified transaction hash
      parameters:
        - name: txhash
          in: path
          description: Eth1 transaction hash
          required: true
          style: simple
          explode: false
          schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/types.ApiResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/types.APIEth1TxDepositResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/ethstore/{day}:
    get:
      tags:
        - ETH.Store®
      summary: Get ETH.Store® day
      description: |-
        ETH.STORE® represents the average financial return validators on the Ethereum network have achieved in a 24-hour period.
        For each 24-hour period the datapoint is denoted by the number of days that have passed since genesis for that period (= beaconchain-day)
        See https://github.com/gobitfly/eth.store for further information.
      parameters:
        - name: day
          in: path
          description: The beaconchain-day (periods of <(24 * 60 * 60) // SlotsPerEpoch // SecondsPerSlot> epochs) to get the the ETH.STORE® for. Must be a number or the string 'latest'.
          required: true
          style: simple
          explode: false
          schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/types.ApiResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/types.APIEthStoreResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/execution/address/{address}:
    get:
      tags:
        - Addresses
      summary: Get address balances
      description: Returns the ether balance and any token balances for a given Ethereum address. Amount of different ECR20 tokens is limited to 200. If you need more, use the /execution/address/{address}/erc20tokens endpoint.
      parameters:
        - name: address
          in: path
          description: provide an Ethereum address consists of an optional 0x prefix followed by 40 hexadecimal characters
          required: true
          style: simple
          explode: false
          schema: {}
        - name: token
          in: query
          description: filter for a specific token by providing a ethereum token contract address
          required: false
          style: form
          explode: true
          schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiEth1AddressResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/execution/address/{address}/erc20tokens:
    get:
      tags:
        - Addresses
      summary: Get ERC20 token balances for address
      description: Returns the ERC20 token balances for a given Ethereum address. Supports pagination.
      parameters:
        - name: address
          in: path
          description: provide an Ethereum address consists of an optional 0x prefix followed by 40 hexadecimal characters
          required: true
          style: simple
          explode: false
          schema: {}
        - name: offset
          in: query
          description: data offset
          required: false
          style: form
          explode: true
          schema: {}
        - name: limit
          in: query
          description: data limit (ranging from 1 to 200)
          required: false
          style: form
          explode: true
          schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/types.ApiEth1AddressERC20TokenResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/execution/block/{blockNumber}:
    get:
      tags:
        - Blocks
      summary: Get blocks by number
      description: Get execution blocks by execution block number
      parameters:
        - name: blockNumber
          in: path
          description: Provide one or more execution block numbers. Coma separated up to max 100.
          required: true
          style: simple
          explode: false
          schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/types.ExecutionBlockApiResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/execution/gasnow:
    get:
      tags:
        - Gas
      summary: Get current gas prices
      description: Gets the current estimation for gas prices in GWei.. The response is split into four estimated inclusion speeds rapid (15 seconds), fast (1 minute), standard (3 minutes) and slow (> 10 minutes).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.GasNowPageData'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/execution/{addressIndexOrPubkey}/produced:
    get:
      tags:
        - Blocks
      summary: Get proposed blocks by address, proposer index or proposer pubkey
      description: |-
        Get a list of proposed or mined blocks from a given fee recipient address, proposer index or proposer pubkey.
        Mixed use of recipient addresses and proposer indexes or proposer pubkeys with an offset is discouraged as it can lead to skipped entries.
      parameters:
        - name: addressIndexOrPubkey
          in: path
          description: Either the fee recipient address, the proposer index or proposer pubkey. You can provide multiple by separating them with ','. Max allowed index or pubkeys are 100, max allowed user addresses are 20.
          required: true
          style: simple
          explode: false
          schema: {}
        - name: offset
          in: query
          description: Offset
          required: false
          style: form
          explode: true
          schema: {}
        - name: limit
          in: query
          description: 'Limit the amount of entries you wish to receive (Maximum: 100)'
          required: false
          style: form
          explode: true
          schema:
            maximum: 100
        - name: sort
          in: query
          description: Sort via the block number either by 'asc' or 'desc'
          required: false
          style: form
          explode: true
          schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/types.ExecutionBlockApiResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/graffitiwall:
    get:
      tags:
        - Misc
      summary: Get graffiti wall
      description: |-
        Returns the most recent pixels that have been painted during the last 10000 slots.
        Optionally set the slot query parameter to look back further.
        Boundary coordinates are included.
        X = 0 and Y = 0 start at the upper left corner.
        Returns an error if an invalid area is provided by the coordinates.
      parameters:
        - name: startx
          in: query
          description: Start X offset
          required: false
          style: form
          explode: true
          schema: {}
        - name: starty
          in: query
          description: Start Y offset
          required: false
          style: form
          explode: true
          schema: {}
        - name: endx
          in: query
          description: End X limit
          required: false
          style: form
          explode: true
          schema: {}
        - name: endy
          in: query
          description: End Y limit
          required: false
          style: form
          explode: true
          schema: {}
        - name: startSlot
          in: query
          description: Start slot to query (end slot - 10000 if empty)
          required: false
          style: form
          explode: true
          schema: {}
        - name: slot
          in: query
          description: End slot to query
          required: false
          style: form
          explode: true
          schema: {}
        - name: summarize
          in: query
          description: Only return end state of each pixel
          required: false
          style: form
          explode: true
          schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/latestState:
    get:
      tags:
        - Network
      summary: Get network state
      description: Returns information on the current state of the network
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.LatestState'
        '400':
          description: Failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/mobile/notify/register:
    post:
      tags:
        - User
      summary: Change mobile notification token
      description: Register or update your mobile notification token
      requestBody:
        description: Your device`s firebase notification token
        content:
          application/json:
            schema: {}
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
      security:
        - ApiKeyAuth: []
  /api/v1/rocketpool/stats:
    get:
      tags:
        - Rocketpool
      summary: Get rocketpool statistics
      description: Returns statistics about the Rocketpool protocol
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/types.ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/types.APIRocketpoolStatsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/rocketpool/validator/{indexOrPubkey}:
    get:
      tags:
        - Validators
      summary: Get rocketpool validators
      description: Returns information about Rocketpool validators
      parameters:
        - name: indexOrPubkey
          in: path
          description: Up to 100 validator indicesOrPubkeys, comma separated
          required: true
          style: simple
          explode: false
          schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/types.ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/types.ApiRocketpoolValidatorResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/slot/{slotOrHash}:
    get:
      tags:
        - Slots
      summary: Get slot
      description: Returns a slot by its slot number or root hash, the latest slot with string latest or the slot containing the head block with string head
      parameters:
        - name: slotOrHash
          in: path
          description: Slot or root hash or the string latest or head
          required: true
          style: simple
          explode: false
          schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/types.ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/types.APISlotResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/slot/{slot}/attestations:
    get:
      tags:
        - Slots
      summary: Get slot attestations
      description: Returns the attestations included in a specific slot
      parameters:
        - name: slot
          in: path
          description: The slot number or "latest"
          required: true
          schema:
            oneOf:
              - type: integer
                minimum: 0
                description: Slot number
              - type: string
                enum:
                  - latest
                description: Latest slot
          example: latest
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/types.ApiResponse'
                  - properties:
                      data:
                        title: Attestations
                        type: array
                        items:
                          $ref: '#/components/schemas/types.APIAttestationResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/types.ApiErrorResponse'
                  - properties:
                      status:
                        example: 'ERROR: slot is in the future. The latest slot is 12751727'
  /api/v1/slot/{slot}/attesterslashings:
    get:
      tags:
        - Slots
      summary: Get slot attestation slashings
      description: Returns the attester slashings included in a specific slot
      parameters:
        - name: slot
          in: path
          description: The slot number or "latest"
          required: true
          schema:
            oneOf:
              - type: integer
                minimum: 0
                description: Slot number
              - type: string
                enum:
                  - latest
                description: Latest slot
          example: latest
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/types.ApiResponse'
                  - properties:
                      data:
                        title: Attestations
                        type: array
                        items:
                          $ref: '#/components/schemas/types.APIAttesterSlashingResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/slot/{slot}/deposits:
    get:
      tags:
        - Slots
      summary: Get slot deposits
      description: Returns the deposits included in a specific block
      parameters:
        - name: slot
          in: path
          description: Block slot
          required: true
          style: simple
          explode: false
          schema: {}
        - name: limit
          in: query
          description: Limit the number of results
          required: false
          style: form
          explode: true
          schema: {}
        - name: offset
          in: query
          description: Offset the number of results
          required: false
          style: form
          explode: true
          schema: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/types.ApiErrorResponse'
  /api/v1/slot/{slot}/proposerslashings:
    get:
      tags:
        - Slots
      summary: Get slot proposer slashings
      description: Returns the proposer slashings included in a specific slot
      parameters:
        - name: slot
          in: path
          description: Slot
