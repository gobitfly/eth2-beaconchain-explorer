get:
  tags:
    - Addresses
  summary: ERC20 token balances
  description: >-
    Returns the ERC20 token balances for a given Ethereum address. Supports
    pagination.
  parameters:
    - name: address
      in: path
      description: >-
        Provide an Ethereum address consisting of an optional 0x prefix followed
        by 40 hexadecimal characters
      required: true
      style: simple
      explode: false
      schema:
        $ref: "../components/schemas/primitives.EthAddress.yaml"
    - name: offset
      in: query
      description: Data offset
      required: false
      style: form
      explode: true
      schema:
        type: integer
        example: 0
    - name: limit
      in: query
      description: Data limit (ranging from 1 to 200)
      required: false
      style: form
      explode: true
      schema:
        type: integer
        example: 20
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../components/schemas/types.ApiResponse.yaml
              - properties:
                  data:
                    type: array
                    items:
                      $ref: >-
                        ../components/schemas/types.ApiEth1AddressERC20TokenResponse.yaml
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/types.ApiErrorResponse.yaml
