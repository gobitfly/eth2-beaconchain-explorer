get:
  tags:
    - Validators
  summary: Income detail history
  description: Retrieve validator income detail history by index or pubkey (up to 100).
  parameters:
    - name: indexOrPubkey
      in: path
      description: Up to 100 validator indicesOrPubkeys, comma separated
      required: true
      style: simple
      explode: false
      schema:
        $ref: "../components/schemas/primitives.indicesOrPubkeys.yaml"
    - name: latest_epoch
      in: query
      description: The latest epoch to consider in the query
      required: false
      style: form
      explode: true
      schema:
        type: integer
        example: 54656
    - name: offset
      in: query
      description: Number of items to skip
      required: false
      style: form
      explode: true
      schema:
        type: integer
        example: 0
    - name: limit
      in: query
      description: Maximum number of items to return, up to 100
      required: false
      style: form
      explode: true
      schema:
        type: integer
        example: 10
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../components/schemas/types.ApiResponse.yaml
              - properties:
                  data:
                    type: array
                    items:
                      $ref: >-
                        ../components/schemas/types.ApiValidatorIncomeHistoryResponse.yaml
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/types.ApiErrorResponse.yaml
