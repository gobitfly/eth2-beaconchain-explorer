get:
  tags:
    - Rewards
  summary: Get validator leaderboard
  description: >-
    Get the current top 100 performing validators (using the income over the
    last 7 days)
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../components/schemas/types.ApiResponse.yaml
              - properties:
                  data:
                    items:
                      $ref: >-
                        ../components/schemas/types.ApiValidatorPerformanceResponse.yaml
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/types.ApiErrorResponse.yaml
