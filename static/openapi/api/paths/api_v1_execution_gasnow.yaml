get:
  tags:
    - Gas
  summary: Current gas prices
  description: >-
    Gets the current estimation for gas prices in GWei.. The response is split
    into four estimated inclusion speeds rapid (15 seconds), fast (1 minute),
    standard (3 minutes) and slow (> 10 minutes).
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/types.GasNowPageData.yaml
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/types.ApiErrorResponse.yaml
