get:
  tags:
    - Validators
  summary: Get validators by credentials or address
  description: >-
    Returns the validator indexes and pubkeys of a withdrawal credential or eth1
    address
  parameters:
    - name: withdrawalCredentialsOrEth1address
      in: path
      description: >-
        Provide a withdrawal credential or an eth1 address with an optional 0x
        prefix
      required: true
      style: simple
      explode: false
      schema: {}
    - name: limit
      in: query
      description: 'Limit the number of results, maximum: 200'
      required: false
      style: form
      explode: true
      schema: {}
    - name: offset
      in: query
      description: Offset the number of results
      required: false
      style: form
      explode: true
      schema: {}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../components/schemas/types.ApiResponse.yaml
              - properties:
                  data:
                    items:
                      $ref: >-
                        ../components/schemas/types.ApiWithdrawalCredentialsResponse.yaml
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/types.ApiErrorResponse.yaml
