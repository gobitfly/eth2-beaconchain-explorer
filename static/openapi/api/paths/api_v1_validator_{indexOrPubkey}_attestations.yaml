get:
  tags:
    - Validators
  summary: Attestations
  description: Get all attestations during the last 100 epochs for up to 100 validators
  parameters:
    - name: indexOrPubkey
      in: path
      description: Up to 100 validator indicesOrPubkeys, comma separated
      required: true
      style: simple
      explode: false
      schema:
        $ref: "../components/schemas/primitives.indicesOrPubkeys.yaml"
    - name: startEpoch
      in: query
      description: 'Start epoch for the query (default: latest epoch - 99)'
      required: false
      style: form
      explode: true
      schema:
        type: integer
        example: 10
    - name: endEpoch
      in: query
      description: 'End epoch for the query (default: latest epoch)'
      required: false
      style: form
      explode: true
      schema:
        type: integer
        example: 20
    - name: slim
      in: query
      description: >-
        If true, drops rarely used week and committee index fields from the
        response
      required: false
      style: form
      explode: true
      schema:
        type: boolean
        example: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/types.ApiResponse.yaml
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/types.ApiErrorResponse.yaml
