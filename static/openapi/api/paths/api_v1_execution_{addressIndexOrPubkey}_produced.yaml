get:
  tags:
    - Blocks
  summary: Proposed blocks by address, proposer index or proposer pubkey
  description: >-
    Get a list of proposed or mined blocks from a given fee recipient address,
    proposer index or proposer pubkey.

    Mixed use of recipient addresses and proposer indexes or proposer pubkeys
    with an offset is discouraged as it can lead to skipped entries.
  parameters:
    - name: addressIndexOrPubkey
      in: path
      description: >-
        Either the fee recipient address, the proposer index or proposer pubkey.
        You can provide multiple by separating them with ','. Max allowed index
        or pubkeys are 100, max allowed user addresses are 20.
      required: true
      style: simple
      explode: false
      schema:
        oneOf:
          - $ref: '../components/schemas/primitives.EthAddress.yaml'
            description: "Fee recipient address"
          - type: integer
            example: 325
            description: Proposer index
          - type: string
            description: Proposer pubkey
            example: "0xa6831544f1e9fb1086b023f0852fe7feb7ed6606bf57c76d26a5dbf0027c125e8f7b76b000d99b676205d7721c1baf81"
    - name: offset
      in: query
      description: Offset
      required: false
      style: form
      explode: true
      schema: {}
    - name: limit
      in: query
      description: 'Limit the amount of entries you wish to receive (Maximum: 100)'
      required: false
      style: form
      explode: true
      schema:
        maximum: 100
    - name: sort
      in: query
      description: Sort via the block number either by 'asc' or 'desc'
      required: false
      style: form
      explode: true
      schema: {}
  responses:
    '200':
      description: Success
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../components/schemas/types.ApiResponse.yaml
              - properties:
                  data:
                    type: array
                    items:
                      $ref: ../components/schemas/types.ExecutionBlockApiResponse.yaml
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/types.ApiErrorResponse.yaml
