get:
  tags:
    - Slots
  summary: Deposits
  description: Returns the deposits included in a specific block
  parameters:
    - name: slot
      in: path
      description: Block slot
      required: true
      style: simple
      explode: false
      schema: {}
    - name: limit
      in: query
      description: Limit the number of results
      required: false
      style: form
      explode: true
      schema: {}
    - name: offset
      in: query
      description: Offset the number of results
      required: false
      style: form
      explode: true
      schema: {}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../components/schemas/types.ApiResponse.yaml
              - properties:
                  data:
                    title: Deposits
                    type: array
                    items:
                      $ref: >-
                        ../components/schemas/types.APIDepositsResponse.yaml
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/types.ApiErrorResponse.yaml
