get:
  tags:
    - Blocks
  summary: Overview
  description: Get execution blocks by execution block number
  parameters:
    - name: blockNumber
      in: path
      description: >-
        Provide one or more execution block numbers. Coma separated up to max
        100.
      required: true
      style: simple
      explode: false
      schema:
        type: integer
        example: 1564646
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../components/schemas/types.ApiResponse.yaml
              - type: object
                properties:
                  data:
                    $ref: ../components/schemas/types.ExecutionBlockApiResponse.yaml
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/types.ApiErrorResponse.yaml
